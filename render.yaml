# Render Deployment Blueprint
# This configuration deploys your entire Expense Manager (Frontend + Backend) as a single service.

services:
  - type: web
    name: expense-manager-live
    env: node
    plan: free # Use 'starter' for better performance if needed
    buildCommand: "npm install && cd server && npm install && cd .. && npm run build"
    startCommand: "cd server && node server.js"
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: JWT_SECRET
        generateValue: true # Render will generate a random secure secret for you
      - key: PORT
        value: 3001
      - key: DB_HOST
        value: # PUT_YOUR_CLOUD_MYSQL_HOST_HERE
      - key: DB_USER
        value: # PUT_YOUR_CLOUD_MYSQL_USER_HERE
      - key: DB_PASSWORD
        value: # PUT_YOUR_CLOUD_MYSQL_PASSWORD_HERE
      - key: DB_NAME
        value: # PUT_YOUR_CLOUD_MYSQL_DATABASE_NAME_HERE
